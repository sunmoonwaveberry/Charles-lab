<B>プロローグ</B>
</P>
研究室へ、一通のエアメイルが届いた。<BR>
<BR>
『あなたの講演のチケットは1分もせずに完売しました。<BR>
まさかすっぽかしたりはしないわよね？<BR>
たとえ太陽がのぼっても間違わないはずのあなただもの<BR>
遅刻すらしないできてくれると信じているわ。<BR>
日時場所は以下のとおり…』<BR>
<BR><BR>
そこまで読んで彼はその手紙を破り捨てた。<BR>
